<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteia Time Justo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sorteia Time Justo</h1>
        
        <div class="section" id="passo1">
            <label for="listaJogadores">Cole o texto do WhatsApp aqui:</label>
            <textarea id="listaJogadores" rows="8" placeholder="Cole toda a lista aqui..."></textarea>
            <button id="btnCarregar" class="btn-principal">Carregar Jogadores</button>
        </div>

        <div class="section" id="passo2" style="display: none;">
            <label>Defina os níveis:</label>
            <p class="dica">Selecione o nível e a descrição do jogador. O padrão é "não conheço" se você não souber.</p>
            <div id="containerNiveis"></div>
            
            <div id="addJogadorContainer" class="input-group" style="margin-top: 15px; margin-bottom: 20px; display: flex; gap: 10px;">
                <input type="text" id="novoJogadorNome" placeholder="Nome do jogador avulso..." style="flex: 1;">
                <button id="btnAdicionar" class="btn-secundario">+ Adicionar</button>
            </div>
            
            <div class="footer-actions">
                <div class="input-group">
                    <label for="qtdTimes">Número de Times:</label>
                    <input type="number" id="qtdTimes" value="2" min="2">
                </div>
                <button id="btnSortear" class="btn-principal">Sortear Times</button>
            </div>
        </div>

        <div id="resultado" class="resultado-container"></div>
        
        <div id="acoesResultado" style="display: none; margin-top: 20px;">
            <button id="btnCopiar" class="btn-secundario">Copiar Times para WhatsApp</button>
            <button id="btnVoltar" class="btn-terciario" style="margin-top: 10px;">Voltar para Níveis</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
